:root{
  --bg:#0a0a0f;--card:#1a1a2e;--accent:#6c63ff;
  --text:#e8e8f0;--muted:#888899;
  --border:rgba(108,99,255,0.25);
  --glow:0 0 30px rgba(108,99,255,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;}
.hero{
  background:linear-gradient(135deg,#0a0a1a,#1a0a2e,#0a1a2e);
  padding:4rem 1rem 3rem;text-align:center;
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(108,99,255,0.15) 0%,transparent 70%);
}
.hero h1{
  font-size:clamp(2rem,5vw,3.5rem);font-weight:900;
  background:linear-gradient(135deg,#fff,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;position:relative;z-index:1;
}
.hero p{color:var(--muted);margin-top:.75rem;font-size:1.1rem;position:relative;z-index:1;}
.badge{
  display:inline-block;background:rgba(108,99,255,0.2);
  border:1px solid var(--accent);color:var(--accent);
  padding:.25rem .75rem;border-radius:999px;font-size:.8rem;
  margin-bottom:1rem;position:relative;z-index:1;
}
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:1.25rem;max-width:1000px;margin:2.5rem auto;padding:0 1rem;
}
.tool-card{
  display:flex;flex-direction:column;align-items:center;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:1.75rem 1rem;
  text-decoration:none;color:var(--text);
  transition:transform .2s,box-shadow .2s,border-color .2s;
  text-align:center;cursor:pointer;
}
.tool-card:hover{
  transform:translateY(-4px);
  box-shadow:var(--glow);
  border-color:var(--accent);
}
.tool-icon{font-size:2.5rem;margin-bottom:.75rem;}
.tool-name{font-size:.95rem;font-weight:600;}
.ad-slot{max-width:1000px;margin:1rem auto;padding:0 1rem;}
footer{
  text-align:center;padding:2rem 1rem;color:var(--muted);
  font-size:.85rem;border-top:1px solid var(--border);margin-top:2rem;
}
footer a{color:var(--accent);text-decoration:none;}
</style>
